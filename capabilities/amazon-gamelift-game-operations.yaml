naftiko: 1.0.0-alpha2
info:
  label: Amazon GameLift Game Operations
  description: Unified workflow capability for game developers and operations teams managing Amazon GameLift resources. Combines
    fleet management, game session lifecycle, player matchmaking, and scaling operations into a single workflow-oriented interface
    for multiplayer game infrastructure.
  tags:
  - Amazon GameLift
  - Gaming
  - Game Servers
  - Multiplayer
  - Matchmaking
  - AWS
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
    AWS_REGION: AWS_REGION
