  exposes:
  - type: rest
    port: 8080
    namespace: gamelift-game-ops-api
    description: Unified REST API for Amazon GameLift game operations management.
    resources:
    - path: /v1/fleets
      name: fleets
      description: Manage game server fleets
      operations:
      - method: GET
        name: list-fleets
        description: List all game server fleets
        call: amazon-gamelift.ListFleets
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-fleet
        description: Create a new game server fleet
        call: amazon-gamelift.CreateFleet
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fleets/{fleetId}
      name: fleet-detail
      description: Get or update a specific fleet
      operations:
      - method: GET
        name: describe-fleet
        description: Get fleet attributes
        call: amazon-gamelift.DescribeFleetAttributes
        with:
          FleetId: rest.fleetId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-fleet
        description: Delete a fleet
        call: amazon-gamelift.DeleteFleet
        with:
          FleetId: rest.fleetId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/game-sessions
      name: game-sessions
      description: Manage game sessions
      operations:
      - method: POST
        name: create-game-session
        description: Start a new game session
        call: amazon-gamelift.CreateGameSession
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: search-game-sessions
        description: Search for active game sessions
        call: amazon-gamelift.SearchGameSessions
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/game-sessions/placement
      name: game-session-placement
      description: Place game sessions using queue optimization
      operations:
      - method: POST
        name: start-placement
        description: Request optimal game session placement
        call: amazon-gamelift.StartGameSessionPlacement
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/player-sessions
      name: player-sessions
      description: Manage player slots in game sessions
      operations:
      - method: POST
        name: create-player-session
        description: Reserve a player slot in a game session
        call: amazon-gamelift.CreatePlayerSession
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/matchmaking
      name: matchmaking
      description: Player matchmaking operations
      operations:
      - method: POST
        name: start-matchmaking
        description: Submit a matchmaking request
        call: amazon-gamelift.StartMatchmaking
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: describe-matchmaking
        description: Get matchmaking ticket status
        call: amazon-gamelift.DescribeMatchmaking
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/scaling-policies
      name: scaling-policies
      description: Fleet auto-scaling policies
      operations:
      - method: PUT
        name: put-scaling-policy
        description: Create or update a fleet scaling policy
        call: amazon-gamelift.PutScalingPolicy
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/builds
      name: builds
      description: Game server builds
      operations:
      - method: GET
        name: list-builds
        description: List all game server builds
        call: amazon-gamelift.ListBuilds
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-build
        description: Create a new game server build
        call: amazon-gamelift.CreateBuild
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/aliases
      name: aliases
      description: Fleet aliases for traffic routing
      operations:
      - method: GET
        name: list-aliases
        description: List all fleet aliases
        call: amazon-gamelift.ListAliases
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-alias
        description: Create a fleet alias
        call: amazon-gamelift.CreateAlias
        outputParameters:
        - type: object
          mapping: $.
