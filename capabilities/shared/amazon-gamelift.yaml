  exposes:
  - type: rest
    port: 8080
    namespace: gamelift-rest-api
    resources:
    - path: /v1/fleets
      name: fleets
      description: Manage game server fleets
      operations:
      - method: GET
        name: list-fleets
        description: List all fleets
        call: amazon-gamelift.ListFleets
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/game-sessions
      name: game-sessions
      description: Manage game sessions
      operations:
      - method: GET
        name: list-game-sessions
        description: Describe game sessions
        call: amazon-gamelift.DescribeGameSessions
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/player-sessions
      name: player-sessions
      description: Manage player sessions
      operations:
      - method: GET
        name: list-player-sessions
        description: Describe player sessions
        call: amazon-gamelift.DescribePlayerSessions
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/matchmaking
      name: matchmaking
      description: Matchmaking operations
      operations:
      - method: GET
        name: list-matchmaking-configs
        description: List matchmaking configurations
        call: amazon-gamelift.DescribeMatchmakingConfigurations
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: gamelift-mcp
    transport: http
    tools:
    - name: list-fleets
      description: List all Amazon GameLift fleets
      hints:
        readOnly: true
        openWorld: true
      call: amazon-gamelift.ListFleets
      outputParameters:
      - type: object
        mapping: $.
    - name: create-fleet
      description: Create a new game server fleet
      hints:
        readOnly: false
      call: amazon-gamelift.CreateFleet
      outputParameters:
      - type: object
        mapping: $.
    - name: describe-fleet
      description: Get fleet attributes and status
      hints:
        readOnly: true
      call: amazon-gamelift.DescribeFleetAttributes
      outputParameters:
      - type: object
        mapping: $.
    - name: create-game-session
      description: Start a new game session
      hints:
        readOnly: false
      call: amazon-gamelift.CreateGameSession
      outputParameters:
      - type: object
        mapping: $.
    - name: search-game-sessions
      description: Search for active game sessions
      hints:
        readOnly: true
      call: amazon-gamelift.SearchGameSessions
      outputParameters:
      - type: object
        mapping: $.
    - name: create-player-session
      description: Reserve a slot for a player in a game session
      hints:
        readOnly: false
      call: amazon-gamelift.CreatePlayerSession
      outputParameters:
      - type: object
        mapping: $.
    - name: start-matchmaking
      description: Start a matchmaking request for players
      hints:
        readOnly: false
      call: amazon-gamelift.StartMatchmaking
      outputParameters:
      - type: object
        mapping: $.
    - name: describe-matchmaking
      description: Get matchmaking ticket status
      hints:
        readOnly: true
      call: amazon-gamelift.DescribeMatchmaking
      outputParameters:
      - type: object
        mapping: $.
    - name: put-scaling-policy
      description: Create or update fleet auto-scaling policy
      hints:
        readOnly: false
      call: amazon-gamelift.PutScalingPolicy
      outputParameters:
      - type: object
        mapping: $.
    - name: list-builds
      description: List all game server builds
      hints:
        readOnly: true
      call: amazon-gamelift.ListBuilds
      outputParameters:
      - type: object
        mapping: $.
    - name: create-alias
      description: Create a fleet alias for traffic routing
      hints:
        readOnly: false
      call: amazon-gamelift.CreateAlias
      outputParameters:
      - type: object
        mapping: $.
    - name: start-game-session-placement
