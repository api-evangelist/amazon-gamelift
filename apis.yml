aid: amazon-gamelift
name: Amazon GameLift
description: >-
  Amazon GameLift is a dedicated game server hosting solution that deploys,
  operates, and scales cloud servers for multiplayer games. It provides
  low-latency, low-cost server infrastructure, eliminates operational overhead,
  and allows you to focus on creating great gaming experiences.
