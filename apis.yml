apis:
  - aid: amazon-gamelift:amazon-gamelift-api
    name: Amazon GameLift API
    description: >-
      The Amazon GameLift API provides programmatic access to create and manage
      fleets, game sessions, player sessions, matchmaking configurations, and
      game server groups for hosting multiplayer game servers. It includes
      operations for managed hosting resources, FlexMatch matchmaking,
      FleetIQ optimization, and Realtime Servers configuration.
